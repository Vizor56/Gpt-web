services:
  - type: web
    name: yaroslav-tutor-school
    env: node
    plan: free
    rootDir: "Сайт с помощью гпт"
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTO_MIGRATE
        value: true
      - key: DATABASE_URL
        sync: false
